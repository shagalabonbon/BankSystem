<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!-- 引入 Thymeleaf -->
<head>
<meta charset="UTF-8">
<title>交易結果</title>

</head>
<body>

	<h1>交易結果</h1>
	
	<table>
		<tr>
			<td>項目</td>
			<td>明細</td>
		</tr>
		<tr>
			<td>轉出帳號</td>
			<td><span th:text="${transferDto.fromAccountNumber}"></span></td>
		</tr>
		<tr>
			<td>轉入帳號</td>
			<td><span th:text="${transferDto.toAccountNumber}"></span></td>
		</tr>
		<tr>
			<td>轉帳金額</td>
			<td><span th:text="${transferDto.amount}"></span></td>
		</tr>
		<tr>
			<td>轉帳備註</td>
			<td><span th:text="${transferDto.description}"></span></td>
		</tr>
	</table>	
	
	<br>
		
	<a href="/bank/transaction/transfer">返回交易頁面</a>

</body>
</html>
